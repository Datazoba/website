name: GitHub Informer for Zoho Cliq

on:
  push:
  pull_request:
  pull_request_review:
  pull_request_review_comment:
  pull_request_target:
  issues:
  issue_comment:
  fork:
  release:
  create:
  delete:
  discussion:
  discussion_comment:
  watch:
  milestone:
  label:
  deployment:
  deployment_status:
  check_run:
  check_suite:
  status:
  workflow_run:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'  # Weekly summary every Monday at 9am UTC
  page_build:
  registry_package:
  gollum:

jobs:
  notify-cliq:
    runs-on: ubuntu-latest
    steps:
      - uses: Integrations-dev/GitHub-Informer@v1
        with:
          channel-endpoint: ${{ secrets.ENDPOINT }}

          # ── PUSH & COMMITS ──────────────────────────────────────────
          push-message: "🚀 *Push by ${{ github.actor }}* on `${{ github.ref_name }}` in ${{ github.repository }} — ${{ github.event.commits | length }} commit(s). View: ${{ github.event.compare }}"

          # ── PULL REQUESTS ────────────────────────────────────────────
          pull-request-message: "📋 *PR ${{ github.event.action }}* by ${{ github.actor }} in ${{ github.repository }} — #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          pull-request-target-message: "🎯 *PR Target ${{ github.event.action }}* by ${{ github.actor }} — #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

          # ── CODE REVIEW ──────────────────────────────────────────────
          pull-request-review-message: "🔍 *PR Review ${{ github.event.action }}* by ${{ github.actor }} on #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }} in ${{ github.repository }}"
          pull-request-review-comment-message: "💬 *Review Comment* by ${{ github.actor }} on PR #${{ github.event.pull_request.number }} in ${{ github.repository }}"
          pull-request-comment-message: "💬 *PR Comment* by ${{ github.actor }} on #${{ github.event.pull_request.number }} in ${{ github.repository }}"

          # ── ISSUES ───────────────────────────────────────────────────
          issues-message: "🐛 *Issue ${{ github.event.action }}* by ${{ github.actor }} in ${{ github.repository }} — #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          issue-comment-message: "💬 *Issue Comment* by ${{ github.actor }} on #${{ github.event.issue.number }} in ${{ github.repository }}"

          # ── CI/CD ────────────────────────────────────────────────────
          check-run-message: "🔄 *Check Run ${{ github.event.action }}*: ${{ github.event.check_run.name }} in ${{ github.repository }} — Status: ${{ github.event.check_run.status }}, Conclusion: ${{ github.event.check_run.conclusion }}"
          check-suite-message: "🧪 *Check Suite ${{ github.event.action }}* in ${{ github.repository }} — Conclusion: ${{ github.event.check_suite.conclusion }}"
          status-message: "🚦 *Status Update* in ${{ github.repository }} — State: ${{ github.event.state }} for commit ${{ github.event.sha }}"
          workflow-run-message: "⚙️ *Workflow Run ${{ github.event.action }}*: ${{ github.event.workflow_run.name }} in ${{ github.repository }} — Conclusion: ${{ github.event.workflow_run.conclusion }}"
          workflow-dispatch-message: "▶️ *Workflow Manually Triggered* by ${{ github.actor }} in ${{ github.repository }}"

          # ── DEPLOYMENTS ──────────────────────────────────────────────
          deployment-message: "🚢 *Deployment Triggered* in ${{ github.repository }} — Environment: ${{ github.event.deployment.environment }} by ${{ github.actor }}"
          deployment-status-message: "📡 *Deployment Status*: ${{ github.event.deployment_status.state }} for environment ${{ github.event.deployment_status.environment }} in ${{ github.repository }}"

          # ── PROJECT & MILESTONE TRACKING ─────────────────────────────
          milestone-message: "🏁 *Milestone ${{ github.event.action }}* in ${{ github.repository }} — ${{ github.event.milestone.title }}"
          label-message: "🏷️ *Label ${{ github.event.action }}* in ${{ github.repository }} — ${{ github.event.label.name }}"
          project-message: "📁 *Project ${{ github.event.action }}* in ${{ github.repository }}"
          project-card-message: "🗂️ *Project Card ${{ github.event.action }}* in ${{ github.repository }}"
          project-column-message: "📊 *Project Column ${{ github.event.action }}* in ${{ github.repository }}"

          # ── RELEASES & PACKAGES ──────────────────────────────────────
          release-message: "🎉 *Release ${{ github.event.action }}*: ${{ github.event.release.name }} (${{ github.event.release.tag_name }}) in ${{ github.repository }}"
          registry-package-message: "📦 *Package ${{ github.event.action }}*: ${{ github.event.registry_package.name }} v${{ github.event.registry_package.package_version.name }} in ${{ github.repository }}"
          page-build-message: "🌐 *GitHub Pages Build* triggered in ${{ github.repository }}"

          # ── REPO EVENTS ──────────────────────────────────────────────
          create-message: "🌿 *${{ github.event.ref_type }} created*: `${{ github.event.ref }}` in ${{ github.repository }} by ${{ github.actor }}"
          delete-message: "🗑️ *${{ github.event.ref_type }} deleted*: `${{ github.event.ref }}` in ${{ github.repository }} by ${{ github.actor }}"
          fork-message: "🍴 *${{ github.repository }} was forked* by ${{ github.actor }} → ${{ github.event.forkee.full_name }}"
          watch-message: "⭐ *${{ github.repository }} was starred* by ${{ github.actor }}"
          public-message: "🌍 *${{ github.repository }} has been made public!*"
          gollum-message: "📖 *Wiki page updated* in ${{ github.repository }} by ${{ github.actor }}"

          # ── DISCUSSIONS ──────────────────────────────────────────────
          discussion-message: "🗣️ *Discussion ${{ github.event.action }}* by ${{ github.actor }} in ${{ github.repository }} — ${{ github.event.discussion.title }}"
          discussion-comment-message: "💬 *Discussion Comment* by ${{ github.actor }} in ${{ github.repository }}"

          # ── SCHEDULED ───────────────────────────────────────────────
          schedule-message: "📅 *Weekly Digest*: Scheduled workflow ran for ${{ github.repository }}"

          # ── FALLBACK ─────────────────────────────────────────────────
          default-message: "⚡ *${{ github.event_name }} (${{ github.event.action }})* in ${{ github.repository }} by ${{ github.actor }}"
          set-message-if-none: true